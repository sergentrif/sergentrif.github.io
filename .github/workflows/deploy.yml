name: deploy

on:
    release:
        types: [published]

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Pages
              uses: actions/configure-pages@v6
              with:
                  static_site_generator: next

            - name: Setup Node.js
              uses: ./.github/composites/setup

            - name: Install dependencies
              run: npm install

            - name: Restore Next cache from previous BUILD
              uses: actions/cache@v5
              with:
                  path: |
                      .next/cache
                  key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

            - name: Build with Next.js
              run: npm run build

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: ./out

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    post_deploy:
        runs-on: ubuntu-latest
        needs: deploy

        steps:
            - name: Submit URLs to IndexNow
              run: |
                  curl -s -X POST "https://api.indexnow.org/indexnow" \
                    -H "Content-Type: application/json; charset=utf-8" \
                    -d '{
                      "host": "adrien.blandin.me",
                      "key": "35f057ef8d8f4b53874ad75b7c8baad9",
                      "keyLocation": "https://adrien.blandin.me/35f057ef8d8f4b53874ad75b7c8baad9.txt",
                      "urlList": [
                        "https://adrien.blandin.me/",
                        "https://adrien.blandin.me/prestations/",
                        "https://adrien.blandin.me/parcours/",
                        "https://adrien.blandin.me/temoignages/",
                        "https://adrien.blandin.me/articles/",
                        "https://adrien.blandin.me/podcasts/",
                        "https://adrien.blandin.me/audit/",
                        "https://adrien.blandin.me/diagnostic/"
                      ]
                    }'
