name: release

on:
    workflow_run:
        workflows: ["ci"]
        types: [completed]
        branches: [main]

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        environment: production
        if: github.event.workflow_run.conclusion == 'success'

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup Node.js
              uses: ./.github/composites/setup

            - name: Install dependencies
              run: npm install

            - name: Release
              run: node_modules/.bin/semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.ABVENTURE_GITHUB_PAT }}
