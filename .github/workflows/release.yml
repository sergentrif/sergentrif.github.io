name: Release

on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: "25"
                  cache: "npm"

            - name: Install dependencies
              run: npm install

            - name: Typecheck
              run: npm run ts:check

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

    release:
        runs-on: ubuntu-latest
        needs: [test]
        environment: production

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "25"
                  cache: "npm"

            - name: Cache dependencies
              id: cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}

            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm install

            - name: Release
              run: node_modules/.bin/semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.ABVENTURE_GITHUB_PAT }}
