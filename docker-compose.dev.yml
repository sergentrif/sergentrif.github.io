services:
    web:
        image: node:22-alpine
        working_dir: /app
        command: sh -c "npm install && npm run dev"
        environment:
            - WATCHPACK_POLLING=true
        volumes:
            - .:/app
            - portfolio-node-modules:/app/node_modules
            - /app/.next
        ports:
            - "3000:3000"

volumes:
    portfolio-node-modules:
